<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intermarché Combustíveis</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--red:#E2001A;--bg:#0e0e0e;--panel:#161616;--card:#1e1e1e;--border:#2a2a2a;--text:#f0f0f0;--muted:#777;--green:#27ae60;--yellow:#f39c12;--blue:#2980b9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--red);padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 20px rgba(226,0,26,.5);z-index:1000;}
.logo{display:flex;align-items:center;gap:10px;}
.logo h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;text-transform:uppercase;}
.logo span{font-weight:300;opacity:.85;}
.hright{display:flex;align-items:center;gap:10px;}
.badge{font-size:.67rem;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px;}
#locBtn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:20px;font-family:'Barlow',sans-serif;font-size:.77rem;cursor:pointer;}
#locBtn:hover{background:rgba(255,255,255,.3);}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:355px;background:var(--panel);display:flex;flex-direction:column;border-right:1px solid var(--border);flex-shrink:0;overflow:hidden;}
.stop{padding:10px 12px;border-bottom:1px solid var(--border);}
.stop input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:.82rem;outline:none;margin-bottom:7px;}
.stop input:focus{border-color:var(--red);}
.stop input::placeholder{color:var(--muted);}
.filters{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.fb{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:3px 9px;border-radius:20px;font-size:.71rem;cursor:pointer;font-family:'Barlow',sans-serif;}
.fb.on{background:var(--red);border-color:var(--red);color:#fff;}
.srt{background:var(--card);border:1px solid var(--border);color:var(--text);padding:3px 7px;border-radius:20px;font-size:.71rem;font-family:'Barlow',sans-serif;cursor:pointer;outline:none;margin-left:auto;}
.stats{display:flex;gap:7px;padding:7px 12px;border-bottom:1px solid var(--border);}
.st{flex:1;background:var(--card);border-radius:6px;padding:6px 7px;text-align:center;}
.sv{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;color:var(--red);}
.sl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.list{flex:1;overflow-y:auto;padding:5px;}
.list::-webkit-scrollbar{width:3px;}
.list::-webkit-scrollbar-thumb{background:var(--border);}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:4px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden;}
.card:hover{border-color:var(--red);transform:translateX(2px);}
.card.sel{border-color:var(--red);background:#1b1010;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);opacity:0;transition:opacity .12s;}
.card:hover::before,.card.sel::before{opacity:1;}
.cn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;text-transform:uppercase;margin-bottom:2px;}
.ca{font-size:.7rem;color:var(--muted);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cp{display:flex;gap:4px;flex-wrap:wrap;}
.pt{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:.7rem;}
.pt .l{color:var(--muted);font-size:.6rem;text-transform:uppercase;margin-right:2px;}
.pt .v{font-weight:600;color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;}
.cf{display:flex;justify-content:space-between;align-items:center;margin-top:5px;}
.db{font-size:.65rem;color:var(--blue);}
.ub{font-size:.6rem;color:var(--muted);}
#map{flex:1;z-index:1;}
.dp{position:absolute;bottom:0;left:355px;right:0;background:var(--panel);border-top:2px solid var(--red);padding:12px 16px;z-index:500;display:none;animation:su .2s ease;}
.dp.open{display:block;}
@keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.dh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.dt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;text-transform:uppercase;color:var(--red);}
.da{font-size:.76rem;color:var(--muted);margin-top:2px;}
.das{display:flex;gap:6px;}
.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;text-transform:uppercase;}
.bnav{background:var(--red);color:#fff;} .bnav:hover{background:#a80014;}
.bsrc{background:var(--card);color:var(--blue);border:1px solid var(--border);}
.bcl{background:var(--card);color:var(--muted);border:1px solid var(--border);}
.dps{display:flex;gap:7px;flex-wrap:wrap;}
.bp{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:95px;}
.bt{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.bv{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.45rem;color:var(--green);}
.bv.na{font-size:.85rem;color:var(--muted);font-weight:400;}
.bv.y{color:var(--yellow);}
.empty{padding:20px;text-align:center;color:var(--muted);font-size:.82rem;}
.leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:8px!important;box-shadow:0 6px 24px rgba(0,0,0,.6)!important;}
.leaflet-popup-tip{background:var(--card)!important;}
.leaflet-popup-content{margin:9px 11px!important;}
.lfn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.93rem;color:var(--red);text-transform:uppercase;margin-bottom:2px;}
.lfa{font-size:.7rem;color:var(--muted);margin-bottom:6px;}
.lfr{font-size:.76rem;display:flex;justify-content:space-between;gap:12px;margin-bottom:2px;}
.lfr span:last-child{font-weight:600;color:var(--green);}
.lfb{margin-top:7px;font-size:.7rem;color:var(--blue);cursor:pointer;text-decoration:underline;}
</style>
</head>
<body>
<header>
  <div class="logo"><span>⛽</span><h1>Intermarché <span>Combustíveis</span></h1></div>
  <div class="hright">
    <span class="badge" id="badg">220 postos · Mar 2026</span>
    <button id="locBtn">📍 Localização</button>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="stop">
      <input type="text" id="srch" placeholder="🔍  Pesquisar concelho, nome...">
      <div class="filters">
        <button class="fb on" data-f="all">Todos</button>
        <button class="fb" data-f="g95">Gasolina 95</button>
        <button class="fb" data-f="gas">Gasóleo</button>
        <button class="fb" data-f="g98">Gasolina 98</button>
        <select class="srt" id="srt">
          <option value="name">Nome A-Z</option>
          <option value="price">Preço ↑</option>
          <option value="dist">Distância</option>
        </select>
      </div>
    </div>
    <div class="stats">
      <div class="st"><div class="sv" id="sN">220</div><div class="sl">Postos</div></div>
      <div class="st"><div class="sv" id="sG">—</div><div class="sl">Média G95</div></div>
      <div class="st"><div class="sv" id="sD">—</div><div class="sl">Média GO</div></div>
      <div class="st"><div class="sv" id="sX">—</div><div class="sl">+ Próximo</div></div>
    </div>
    <div class="list" id="lst"></div>
  </div>
  <div id="map"></div>
  <div class="dp" id="dp">
    <div class="dh">
      <div><div class="dt" id="dname"></div><div class="da" id="daddr"></div></div>
      <div class="das">
        <button class="btn bnav" id="bnav">🧭 Navegar</button>
        <button class="btn bsrc" id="bsrc">🔗 Fonte</button>
        <button class="btn bcl" id="bcl">✕</button>
      </div>
    </div>
    <div class="dps" id="dprices"></div>
  </div>
</div>

function rl(ps){const l=document.getElementById('lst');if(!ps.length){l.innerHTML='<div class="empty">Nenhum posto encontrado.</div>';return;}l.innerHTML=ps.map(p=>{const dist=p.dist!=null?`<span class="db">📍 ${p.dist<1?(p.dist*1000).toFixed(0)+'m':p.dist.toFixed(1)+'km'}</span>`:'';const pr=[p.g95?`<div class="pt"><span class="l">95</span><span class="v">${p.g95.toFixed(3)}€</span></div>`:'',p.gas?`<div class="pt"><span class="l">GO</span><span class="v">${p.gas.toFixed(3)}€</span></div>`:'',p.g98?`<div class="pt"><span class="l">98</span><span class="v">${p.g98.toFixed(3)}€</span></div>`:'',p.g95plus?`<div class="pt"><span class="l">95+</span><span class="v">${p.g95plus.toFixed(3)}€</span></div>`:'',].filter(Boolean).join('')||'<div class="pt"><span class="l">n/d</span><span class="v" style="color:var(--muted)">—</span></div>';return `<div class="card${sid===p.id?' sel':''}" onclick="sel('${p.id}')"><div class="cn">${p.name}</div><div class="ca">${p.concelho}</div><div class="cp">${pr}</div><div class="cf">${dist}<span class="ub">${p.updated}</span></div></div>`;}).join('');}
function rm(ps){Object.values(mrk).forEach(m=>map.removeLayer(m));mrk={};ps.forEach(p=>{if(!p.lat||!p.lng)return;const m=L.marker([p.lat,p.lng],{icon:ico(false)});const rows=[p.g95?`<div class="lfr"><span>Gasolina 95</span><span>${p.g95.toFixed(3)}€</span></div>`:'',p.gas?`<div class="lfr"><span>Gasóleo</span><span>${p.gas.toFixed(3)}€</span></div>`:'',p.g98?`<div class="lfr"><span>Gasolina 98</span><span>${p.g98.toFixed(3)}€</span></div>`:'',].filter(Boolean).join('');m.bindPopup(`<div class="lfn">${p.name}</div><div class="lfa">${p.concelho}</div><div>${rows||'<span style="color:var(--muted);font-size:.73rem">Preços n/d</span>'}</div><div class="lfb" onclick="sel('${p.id}')">Ver detalhes →</div>`);m.on('click',()=>sel(p.id));m.addTo(map);mrk[p.id]=m;});}
function sel(id){sid=id;const p=all.find(x=>x.id===id);if(!p)return;Object.entries(mrk).forEach(([pid,m])=>m.setIcon(ico(pid===id)));if(p.lat&&p.lng)map.flyTo([p.lat,p.lng],15,{duration:.8});document.getElementById('dname').textContent=p.name;document.getElementById('daddr').textContent=p.concelho;const fs=[{k:'g95',l:'Gasolina 95 Simples'},{k:'g95plus',l:'Gasolina 95 Aditivada',y:1},{k:'g98',l:'Gasolina 98'},{k:'gas',l:'Gasóleo Simples'},{k:'gasplus',l:'Gasóleo Aditivado',y:1}];document.getElementById('dprices').innerHTML=fs.map(f=>{const v=p[f.k];return `<div class="bp"><div class="bt">${f.l}</div><div class="bv${v?f.y?' y':'':' na'}">${v?v.toFixed(3)+'€':'N/D'}</div></div>`;}).join('');document.getElementById('bnav').onclick=()=>window.open(p.lat?`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}&travelmode=driving`:`https://www.google.com/maps/search/${encodeURIComponent(p.name+' '+p.concelho+' Portugal')}`,'_blank');document.getElementById('bsrc').onclick=()=>window.open(p.url,'_blank');document.getElementById('dp').classList.add('open');rl(fil);document.querySelectorAll('.card')[fil.findIndex(x=>x.id===id)]?.scrollIntoView({behavior:'smooth',block:'nearest'});}
function af(){const q=document.getElementById('srch').value.toLowerCase();const s=document.getElementById('srt').value;fil=all.filter(p=>{if(q&&!p.name.toLowerCase().includes(q)&&!p.concelho.toLowerCase().includes(q))return false;if(sf==='g95'&&!p.g95&&!p.g95plus)return false;if(sf==='gas'&&!p.gas&&!p.gasplus)return false;if(sf==='g98'&&!p.g98)return false;return true;});if(s==='price'){const k=sf==='gas'?'gas':sf==='g98'?'g98':'g95';fil.sort((a,b)=>(a[k]||999)-(b[k]||999));}else if(s==='dist'&&uloc)fil.sort((a,b)=>(a.dist||9999)-(b.dist||9999));else fil.sort((a,b)=>a.name.localeCompare(b.name,'pt'));rl(fil);rm(fil);us();}
function cd(lat,lng){const R=6371;all.forEach(p=>{if(!p.lat||!p.lng){p.dist=null;return;}const a=Math.sin((p.lat-lat)*Math.PI/360)**2+Math.cos(lat*Math.PI/180)*Math.cos(p.lat*Math.PI/180)*Math.sin((p.lng-lng)*Math.PI/360)**2;p.dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));});}
function us(){document.getElementById('sN').textContent=fil.length;const gv=fil.map(p=>p.g95).filter(v=>v>0),dv=fil.map(p=>p.gas).filter(v=>v>0);document.getElementById('sG').textContent=gv.length?(gv.reduce((a,b)=>a+b,0)/gv.length).toFixed(3)+'€':'—';document.getElementById('sD').textContent=dv.length?(dv.reduce((a,b)=>a+b,0)/dv.length).toFixed(3)+'€':'—';if(uloc){const n=fil.filter(p=>p.dist!=null).sort((a,b)=>a.dist-b.dist)[0];document.getElementById('sX').textContent=n?(n.dist<1?(n.dist*1000).toFixed(0)+'m':n.dist.toFixed(1)+'km'):'—';}}
document.getElementById('srch').addEventListener('input',af);
document.getElementById('srt').addEventListener('change',af);
document.querySelectorAll('.fb').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');sf=b.dataset.f;af();}));
document.getElementById('bcl').addEventListener('click',()=>{document.getElementById('dp').classList.remove('open');sid=null;Object.values(mrk).forEach(m=>m.setIcon(ico(false)));rl(fil);});
document.getElementById('locBtn').addEventListener('click',()=>{if(!navigator.geolocation){alert('Geolocalização não suportada.');return;}navigator.geolocation.getCurrentPosition(pos=>{uloc=[pos.coords.latitude,pos.coords.longitude];L.circleMarker(uloc,{radius:10,color:'#2980b9',fillColor:'#2980b9',fillOpacity:.7,weight:2}).addTo(map).bindPopup('A sua localização');map.flyTo(uloc,11,{duration:1.1});cd(uloc[0],uloc[1]);document.getElementById('srt').value='dist';af();},()=>alert('Não foi possível obter a localização.'));});
initMap();
af();
const pts=all.filter(p=>p.lat&&p.lng).map(p=>[p.lat,p.lng]);
if(pts.length)map.fitBounds(L.latLngBounds(pts),{padding:[40,40]});
</script>
</body>
</html>
